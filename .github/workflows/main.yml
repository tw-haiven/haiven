name: Haiven
run-name: Security Scan, Test and Build

env:
  REGISTRY: "ghcr.io"
  AWS_BEDROCK_REGION: "us-east-1"

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.cursor/**'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '20 17 * * *' # Sets Semgrep to scan every day at 17:20 UTC.

permissions:
  security-events: write

jobs:
  semgrep:
    name: semgrep-oss/scan
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    if: (github.actor != 'dependabot[bot]')

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      
      - name: Run full Semgrep scan
        run: semgrep scan --metrics=off --config "p/default" --sarif > semgrep.sarif

      - name: Check for high severity issues
        run: semgrep scan --metrics=off --config "p/default" --error --severity=ERROR
        continue-on-error: false

      - name: Upload SARIF file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: semgrep-results
          path: semgrep.sarif
          retention-days: 7

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  Test:
    needs: semgrep
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd
      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.18.0'
      - name: Install Yarn
        run:
          npm install yarn
      - name: Install Node.js dependencies
        run: |
          cd ui
          yarn install
      - name: Run Frontend tests
        run: |
          cd ui
          yarn test
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Install App dependencies
        run: |
          cd app
          poetry install --no-interaction --no-root
      - name: Run Backend unit tests
        run: |
          cd app
          poetry run pytest -m 'not integration' tests/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BEDROCK_REGION: ${{ env.AWS_BEDROCK_REGION }}
      - name: Install CLI dependencies
        run: |
          cd cli && \
          poetry install --no-interaction --no-root
      - name: Run CLI tests
        run: |
          cd cli && \
          poetry run pytest tests/

  Build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [Test]
    permissions:
      contents: 'read'
      id-token: 'write'
      packages: 'write'
    outputs:
      image_digest: ${{ steps.kaniko-base.outputs.digest }}
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        id: metadata
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}

      - name: Kaniko build base image
        id: 'kaniko-base'
        uses: int128/kaniko-action@e8b42bea2cca90bd7f10cb115ea40cb59198296e
        with:
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache: true
          cache-repository: ${{ env.REGISTRY }}/${{ github.repository }}/cache
          push: true
          context: .

      # The fine-grained access tokens used by these requests need to have read & write access to "Contents"
      # (Explored GH Webhooks instead of these steps instead, but couldn't get the auth to work)
      - name: Notify TW demo deployment
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_HAIVEN_DEPLOYMENT_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/tw-haiven/haiven-tw-demo-deployment/dispatches \
            -d '{"event_type":"haiven-base-new","client_payload":{}}' \
            --fail